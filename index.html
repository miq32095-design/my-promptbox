<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptBox</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="#/">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none">
              <rect x="7" y="5" width="16" height="20" rx="5" fill="currentColor" opacity="0.18" />
              <rect x="10" y="8" width="16" height="20" rx="5" fill="currentColor" opacity="0.88" />
              <path d="M15 16.2h4.2a2.3 2.3 0 0 0 0-4.6H15V22" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <span>
            <strong>PromptBox</strong>
            <small>Creative Prompt Workspace</small>
          </span>
        </a>
        <nav class="nav" aria-label="主导航">
          <a data-route="/" href="#/"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 10.5 12 4l8 6.5V20H5v-9.5Z"/></svg>首页</a>
          <a data-route="/prompts" href="#/prompts"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 4h12v16H6z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>Prompt</a>
          <a data-route="/edit" href="#/edit"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>新建 Prompt</a>
          <a data-route="/categories" href="#/categories"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>分类管理</a>
          <a data-route="/favorites" href="#/prompts"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M20.8 4.6a5.4 5.4 0 0 0-7.6 0L12 5.8l-1.2-1.2a5.4 5.4 0 0 0-7.6 7.6L12 21l8.8-8.8a5.4 5.4 0 0 0 0-7.6Z"/></svg>收藏夹</a>
          <a data-route="/settings" href="#/settings"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/><path d="M4 12h2M18 12h2M12 4v2M12 18v2M6.3 6.3l1.4 1.4M16.3 16.3l1.4 1.4M17.7 6.3l-1.4 1.4M7.7 16.3l-1.4 1.4"/></svg>设置</a>
        </nav>
        <div class="sidebar-tools">
          <div class="storage-mini">
            <div>
              <span>存储使用</span>
              <strong>2%</strong>
            </div>
            <div class="mini-ring">2%</div>
            <small>本地存储</small>
          </div>
          <a class="side-import" href="#/settings">
            <svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg>
            导入 / 导出
          </a>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="pageKicker">欢迎回来！👋</p>
            <h1 id="pageTitle">PromptBox</h1>
          </div>
          <a class="primary-action" href="#/edit">
            <svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            新建 Prompt
          </a>
        </header>
        <section id="app" class="view" aria-live="polite"></section>
      </main>

      <nav class="mobile-nav" aria-label="移动端导航">
        <a data-route="/" href="#/"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 10.5 12 4l8 6.5V20H5v-9.5Z"/></svg>首页</a>
        <a data-route="/prompts" href="#/prompts"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 4h12v16H6z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>列表</a>
        <a data-route="/edit" href="#/edit"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>新建</a>
        <a data-route="/categories" href="#/categories"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>分类</a>
        <a data-route="/settings" href="#/settings"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/><path d="M4 12h2M18 12h2M12 4v2M12 18v2M6.3 6.3l1.4 1.4M16.3 16.3l1.4 1.4M17.7 6.3l-1.4 1.4M7.7 16.3l-1.4 1.4"/></svg>设置</a>
      </nav>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
